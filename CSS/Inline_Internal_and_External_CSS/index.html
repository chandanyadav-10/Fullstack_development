<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Types of CSS</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- Internal CSS --> 
    <style>
      h2 {
        color: red;
        text-align: center;
      }

      p {
        font-size: 20px;
        color: purple;
      }
    </style>
  </head>
  <body>
    <!-- Inline CSS -->
    <h1 style="color: blue; background-color: lightgray">This is Inline CSS</h1>

    <!-- Internal CSS -->
    <h2>This is Internal CSS</h2>

    <p>This paragraph is styled using Internal CSS.</p>

    <!-- External CSS -->
    <div class="box">This is External CSS</div>
  </body>
</html>
