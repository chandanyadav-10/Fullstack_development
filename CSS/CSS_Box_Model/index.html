<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Model</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .box {
        background-color: aquamarine;
      }
      .box1 {
        color: rgb(222, 8, 8);
        height: 200px; 
        padding: 20px;
        border: 4px solid orange;
        margin: 5px;
        box-sizing: border-box;

      }
      .box2{
        color: darkred;
        height: 200px;
        padding: 20px;
        border: 4px solid rgb(72, 0, 255);
        margin: 20px;
        box-sizing: border-box;
      }

    </style>
  </head>
  <body>
    <div class="box box1">I am Box1</div>
    <div class="box box2">I am Box2</div>
  </body>
</html>
