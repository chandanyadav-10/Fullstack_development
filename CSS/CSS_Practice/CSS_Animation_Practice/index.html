<!doctype html>
<html>
  <head>
    <style>
      .box {
        width: 100px;
        height: 100px;
        background-color: red;

        animation: moveBox 3s infinite;
      }

      @keyframes moveBox {
        from {
          transform: translateX(0px);
        }

        to {
          transform: translateX(300px);
          background-color: aqua;
        }
      }
    </style>
  </head>

  <body>
    <div class="box"></div>
  </body>
</html>
