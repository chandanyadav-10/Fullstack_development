<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Grid - 1</title>
    <style>
      .container {
        border: 2px solid black;
        display: grid;
        width: 80vw;
        height: 80vh;
        grid-template-columns: [pahela] 120px  [dusra] 140px [t];
        grid-template-rows: [first] 100px [second] 100px [third] 100px;
        /* grid-template-columns: 1fr 2fr 1fr; */
        /* grid-template-columns: repeat(4, 1fr); */
        /* grid-template-columns: repeat(4, minmax(100px, 1fr)); */
        grid-template-columns: repeat(4, 70px);
        /* grid-template-rows: repeat(4, 70px); */
        /* gap: 40px; */
        /* row-gap: 20px; */
        /* column-gap: 40px; */

        /* to align within grid cell we use following */
        /* justify-items: center;
        align-items: center; */

        /* to align whole grid cell within caontainer we use following */
        /* justify-content: center; */
        /* align-content: center; */

        /* to justify-content and align-content we use */
        /* place-content: center; */
      }
      .item {
        height: 60px;
        width: 60px;
        border: 2px solid red;
        /* border-radius: 20px;
        margin: 10px; */
      }

      .item-4{
        /* grid-row: 1/2;
        grid-column: 1/2; */
        
        /* grid-row: first/third; */
        /* grid-column: pahela/dusra; */
        /* grid-column: pahela/t; */
  
      }
      .item-1{
        /* align-self: start; */
        grid-row: 1/2;
        grid-column: 1/2;

        /* or we can do this 👇*/
        /* grid-row-start: 1;
        grid-row-end: 2;
        grid-column-start: 1;
        grid-column-end: 2; */
      } 
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item item-1">1</div>
      <div class="item">2</div>
      <div class="item">3</div>
      <div class="item item-4">4</div>
      <div class="item item-5">5</div>
    </div>
  </body>
</html>
