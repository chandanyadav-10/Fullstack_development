<!doctype html>

    <title>Navbar Using Flexbox</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: sans-serif, serif;
    }

    .navbar {
      /* height: 48px; */
      background-color: #f6f6f6;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin: 10px;
      padding: 30px;
      border: 1px solid #cecece;
      border-radius: 4px;
      position: sticky;
      top: 10px;
      z-index: 1000;
    }

    ul {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .download {
      padding: 10px 20px;
      border: none;
      background: #ebdc14;
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .download::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.8),
        transparent
      );
      transition: left 0.6s ease;
    }

    .download:hover::before {
      left: 150%;
    }

    .right {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 5px;
    }

    .cardContainer {
      display: grid;
      grid-template-columns: 300px 300px 300px;
      /* grid-template-rows: 300px 300px 300px 300px; */
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      overflow: hidden;
    }

    .box {
      height: 200px;
      background-color: #f6f6f6;
      border: 1px solid #cecece;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 15px;
    }

    button {
      margin-top: 50px;
      margin: 5px;
      border: none;
      padding: 20px;
    }

    .btn-64 {
      background: linear-gradient(76deg, #cbda17, #d1b011a1);
      border-radius: 5px;
      color: black;
    }
    .btn-32 {
      background-color: black;
      border-radius: 5px;
      color: white;
    }

    @media screen and (max-width: 955px) {
      .cardContainer {
        grid-template-columns: 1fr;
      }
    }
  </style>
