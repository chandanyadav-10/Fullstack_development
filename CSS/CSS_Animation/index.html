<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Animation</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .container {
        width: 100vw;
        height: 20vh;
        background-color: rgb(192, 224, 224);
        display: flex;
        align-items: center;
      }

      .box {
        width: 200px;
        height: 50px;
        background-color: aquamarine;
        display: flex;
        justify-content: center;
        align-items: center;
        /* animation: name duration timing-function delay iteration-count direction fill-mode; */
        /* animation-name: chandanKaAnimation;
        animation-duration: 8s;
        animation-timing-function: linear;
        animation-delay: 3s;
        animation-iteration-count: infinite;
        /* animation-direction: reverse; */
        /* animation-direction: alternate-reverse; */
        /* animation-play-state: paused; */

        /* animation: chandanKaAnimation 5s ease 2s normal forwards; */
        animation: chandanKaAnimation 5s ease 3s normal backwards, chandan2 5s ease 3s normal backwards;
      }

      @keyframes chandanKaAnimation {
        from {
          transform: translateX(0);
          background-color: brown;
        }

        to {
          background-color: chartreuse;
          transform: translateX(100vw);
        }
      }
      @keyframes chandanKaAnimation {
        from {
          background-color: brown;
        }

        to {
          background-color: chartreuse;
        }
      }

      @keyframes chandan2 {
        0% {
          transform: rotate(100deg);
        }

        20% {
          transform: rotate(200deg);
        }
        50% {
          transform: rotate(220deg);
        }
        80% {
          transform: rotate(300deg);
        }
        100% {
          transform: rotate(310deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">I am Animation box</div>
    </div>
  </body>
</html>
