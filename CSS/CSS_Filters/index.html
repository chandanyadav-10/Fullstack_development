<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Filters</title>
    <style>
        img{
            height: 300px;
            width: 300px;
            object-fit: cover;
        }
        .img1{
            filter: blur(3px);
        }
        .img2{
            /* filter: contrast(200%); */
            filter: drop-shadow(16px 16px 20px red) invert(75%);
        }
        .img3{
            filter: grayscale(80%);
            /* filter: sepia(); */
        }
        .img4{
            filter: hue-rotate(90deg);
        }

    </style>
</head>
<body>
    <div class="container">
        <img class="img1" src="https://blog.imago-images.com/hs-fs/hubfs/imago0058449704h.jpg?width=760&height=505&name=imago0058449704h.jpg" alt="">
        <img class="img2" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRFU7U2h0umyF0P6E_yhTX45sGgPEQAbGaJ4g&s" alt="">
        <img class="img3" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRWFEWXg_To5nU7qvKm8j8tZkFIaM92hufSFQ&s" alt="">
        <img class="img4" src="https://pub-static.fotor.com/static/web/lib/fotor-bundle/nav/v2/images/ai-image-generator.jpg" alt="">
    </div>
</body>
</html>
