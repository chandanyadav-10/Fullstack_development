<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cricket Score Table</title>
  </head>
  <body>
    <caption>
      Cricket Match Scorecard
    </caption>
    <table>
      <thead>
        <tr>
          <th>Team</th>
          <th>Runs</th>
          <th>Wickets</th>
          <th>Overs</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>India</td>
          <td>245</td>
          <td>6</td>
          <td>50</td>
        </tr>
        <tr>
          <td>Australia</td>
          <td>230</td>
          <td>9</td>
          <td>50</td>
        </tr>
      </tbody>
    </table>
<!-- ============================================================================================= -->
    <table>
      <tr>
        <th colspan="4">India vs Australia - Final Match</th>
      </tr>
      <tr>
        <th>Team</th>
        <th>Runs</th>
        <th>Wickets</th>
        <th>Overs</th>
      </tr>
      <tr>
        <td>India</td>
        <td>245</td>
        <td>6</td>
        <td>50</td>
      </tr>
      <tr>
        <td>Australia</td>
        <td>230</td>
        <td>9</td>
        <td>50</td>
      </tr>
    </table>
  </body>
</html>
